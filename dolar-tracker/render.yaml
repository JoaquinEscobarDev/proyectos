services:
  - type: web
    name: dolar-tracker
    env: node
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: EXCHANGE_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: UPDATE_TOKEN
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_EMAIL
        sync: false
      - key: UMBRAL_CAMBIO
        value: "3"
