services:
  - type: web
    name: dolar-tracker
    env: node
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: EXCHANGE_API_KEY
        sync: false
      - key: GREEN_INSTANCE_ID
        sync: false
      - key: GREEN_API_TOKEN
        sync: false
      - key: GREEN_GROUP_CHAT_ID
        sync: false
      - key: UMBRAL_ALTO
        value: "0"
      - key: UMBRAL_BAJO
        value: "0"
      - key: UMBRAL_CAMBIO
        value: "3"
      - key: FRONTEND_URL
        sync: false
